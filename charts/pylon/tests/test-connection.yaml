apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "pylon.fullname" . }}-test-connection"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "pylon.fullname" . }}-api:{{ .Values.api.port }}/healthz', '-O', '-', '-q', '--timeout=5']
