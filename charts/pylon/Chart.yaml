apiVersion: v2
name: pylon
description: A Helm chart for the Pylon AI platform
type: application
version: 0.2.0
appVersion: "0.2.0"
maintainers:
  - name: pylon-ai
dependencies:
  - name: postgresql
    version: "~15.5"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: "~19.6"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: nats
    version: "~1.2"
    repository: https://nats-io.github.io/k8s/helm/charts/
    condition: nats.enabled
