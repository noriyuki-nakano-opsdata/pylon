## Pylon Platform Helm Values

image:
  repository: pylon-ai/pylon
  tag: "0.2.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

api:
  replicaCount: 1
  port: 8080
  metricsPort: 9090
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

worker:
  replicaCount: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  podDisruptionBudget:
    enabled: true
    minAvailable: 1

config:
  logLevel: info
  environment: production

## PostgreSQL (Bitnami)
postgresql:
  enabled: true
  auth:
    database: pylon
    username: pylon
    existingSecret: ""
  primary:
    persistence:
      size: 10Gi

## Redis (Bitnami)
redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    existingSecret: ""
  master:
    persistence:
      size: 1Gi

## NATS
nats:
  enabled: true
  config:
    jetstream:
      enabled: true
      memoryStore:
        maxSize: 256Mi
      fileStore:
        maxSize: 1Gi

## Vault (external)
vault:
  address: ""
  secretName: ""

## Secrets
secrets:
  dbPassword: ""
  vaultToken: ""
  existingSecret: ""

## Ingress
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: pylon.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

## Observability
serviceMonitor:
  enabled: true
  interval: 30s
  scrapeTimeout: 10s

## Network Policy
networkPolicy:
  enabled: true
