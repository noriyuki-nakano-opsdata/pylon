{{- if .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pylon.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "pylon.apiSelectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if .Values.worker.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "pylon.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "pylon.workerSelectorLabels" . | nindent 6 }}
{{- end }}
