{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pylon.fullname" . }}-deny-all
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pylon.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pylon.fullname" . }}-allow-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pylon.apiSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.api.port }}
          protocol: TCP
        - port: {{ .Values.api.metricsPort }}
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 4222
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pylon.fullname" . }}-allow-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pylon.workerSelectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: {{ .Values.api.metricsPort }}
          protocol: TCP
  egress:
    - ports:
        - port: 5432
          protocol: TCP
        - port: 6379
          protocol: TCP
        - port: 4222
          protocol: TCP
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
{{- end }}
