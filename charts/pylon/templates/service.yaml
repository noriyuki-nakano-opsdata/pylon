apiVersion: v1
kind: Service
metadata:
  name: {{ include "pylon.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.api.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "pylon.apiSelectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pylon.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pylon.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.api.metricsPort }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "pylon.workerSelectorLabels" . | nindent 4 }}
